services:
  # FastAPI 后端服务：提供 Nacos 配置、设备状态、Dashboard 和模拟器接口。
  nacos-api:
    build:
      context: ./backend
    container_name: nacos-api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # 旧静态演示前端：通过 Nginx 把 /api 反向代理到 nacos-api。
  nacos-web:
    build:
      context: ./frontend
    container_name: nacos-web
    depends_on:
      - nacos-api
    ports:
      - "9000:80"
    restart: unless-stopped
